name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
  pull_request:
    branches:
      - main
      - master
      - dev
      - develop

jobs:
  analyze:
    name: Flutter Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Check Formatting
        run: flutter format --set-exit-if-changed lib/ test/
        continue-on-error: true # Allow small formatting issues to not block development

      - name: Static Analysis
        run: flutter analyze

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

